<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Space</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --accent: #00ff88;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            border: 1px solid #333;
            padding: 40px;
            border-radius: 15px;
            background: #111;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }
        .container:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }
        h1 {
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        p {
            opacity: 0.8;
            line-height: 1.6;
        }
        .status {
            display: inline-block;
            margin-top: 20px;
            padding: 5px 15px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--accent);
            border-radius: 20px;
            font-size: 0.8em;
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Project</h1>
        <p>Этот сайт защищен и оптимизирован для работы 24/7.</p>
        <div class="status">System Online</div>
    </div>
</body>
</html>
